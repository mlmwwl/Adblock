name: Build Mihomo Ruleset

on:
  push:
    paths:
      - 'domain/**'
      - 'tracker/**'
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mihomo
        run: |
          # 获取下载链接并确保它是二进制
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64") and endswith(".gz")) | .browser_download_url' | head -n 1)
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o mihomo.gz "$DOWNLOAD_URL"
          gunzip -f mihomo.gz
          find . -maxdepth 1 -type f -name "mihomo-linux-amd64*" -exec mv {} mihomo \;
          chmod +x mihomo

      - name: Convert to MRS
        run: |
          # 使用 mihomo 将 txt 转换为二进制 mrs 格式
          # 注意：behavior 根据你的文件内容决定，通常是 domain
          ./mihomo convert ruleset domain final_list.txt adblock.mrs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: adblock-ruleset
          path: adblock.mrs

      - name: Deploy to Release Branch
        run: |
          # 1. 创建一个临时文件夹，把生成的 mrs 拷进去
          mkdir deploy
          cp adblock.mrs deploy/
          cd deploy

          # 2. 初始化为一个全新的 git 仓库
          git init
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 3. 提交文件
          git add adblock.mrs
          git commit -m "Auto-build MRS: $(date)"

          # 4. 强行推送到远程仓库的 release 分支
          # 注意：这里的 GITHUB_TOKEN 是 Actions 自动提供的，不需要你额外设置
          git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:release --force
