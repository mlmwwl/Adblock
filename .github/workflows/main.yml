name: Build Mihomo Ruleset

on:
  push:
    paths:
      - 'domain/**'
      - 'tracker/**'
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mihomo Tool
        run: |
          # 获取最新版本的下载 URL (针对 Linux amd64)
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep "browser_download_url.*linux-amd64-v.*\.tar\.gz" | cut -d '"' -f 4 | head -n 1)
          
          echo "Downloading from: $DOWNLOAD_URL"
          
          # 下载并解压
          curl -L -o mihomo.tar.gz "$DOWNLOAD_URL"
          tar -xzf mihomo.tar.gz
          
          # 寻找解压后的二进制文件并重命名为 mihomo
          # 因为解压出来的文件名通常带版本号，如 mihomo-linux-amd64-v1.18.3
          find . -name "mihomo-linux-amd64-*" -exec mv {} mihomo \;
          chmod +x mihomo

      - name: Convert to MRS
        run: |
          # 使用 mihomo 将 txt 转换为二进制 mrs 格式
          # 注意：behavior 根据你的文件内容决定，通常是 domain
          ./mihomo convert ruleset domain final_list.txt adblock.mrs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: adblock-ruleset
          path: adblock.mrs

      - name: Deploy to Release/Branch
        # 你可以选择将生成的 mrs 推送到一个新的分支（如 release 分支）或 Release 页面
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -B release
          git add adblock.mrs
          git commit -m "Update adblock.mrs at $(date)"
          git push origin release --force
