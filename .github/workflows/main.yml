name: Build Mihomo Ruleset

on:
  push:
    paths:
      - 'domain/**'
      - 'tracker/**'
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mihomo Tool
        run: |
          # 下载适合 Linux 的 mihomo 二进制文件（用于编译 mrs）
          curl -L -o mihomo.tar.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.tar.gz
          tar -xzf mihomo.tar.gz
          chmod +x mihomo

      - name: Aggregate and Sort Lists
        run: |
          # 合并 domain 和 tracker 文件夹下的所有文件内容
          # 使用 find 避免文件过多导致的参数溢出，并确保只读取文件内容
          find domain/ tracker/ -type f -exec cat {} + > combined_raw.txt
          
          # A-Z 排序并输出为最终的 txt 准备转换
          sort combined_raw.txt | uniq > final_list.txt

      - name: Convert to MRS
        run: |
          # 使用 mihomo 将 txt 转换为二进制 mrs 格式
          # 注意：behavior 根据你的文件内容决定，通常是 domain
          ./mihomo convert ruleset domain final_list.txt adblock.mrs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: adblock-ruleset
          path: adblock.mrs

      - name: Deploy to Release/Branch
        # 你可以选择将生成的 mrs 推送到一个新的分支（如 release 分支）或 Release 页面
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -B release
          git add adblock.mrs
          git commit -m "Update adblock.mrs at $(date)"
          git push origin release --force
