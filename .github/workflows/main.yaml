name: Build Mihomo Ruleset

on:
  push:
    paths:
      - 'domain/**'
      - 'tracker/**'
      - 'blocklist/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mihomo
        run: |
          # 只匹配标准 linux-amd64 版本，排除 alpha、compatible、go1xx 等变体
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | jq -r '.assets[] | select(
                .name | test("linux-amd64")
                and test("\\.gz$")
                and (test("alpha|compatible|go1") | not)
              ) | .browser_download_url' \
            | head -n 1)

          echo "Downloading: $DOWNLOAD_URL"

          # 使用 wget 自动跟随所有重定向，确保下载到真实文件
          wget -q --show-progress -O mihomo.gz "$DOWNLOAD_URL"

          echo "Downloaded size: $(du -sh mihomo.gz)"
          gunzip -f mihomo.gz

          chmod +x mihomo

          ./mihomo -v

      - name: Aggregate and Sort Lists
        run: |
          mkdir -p releases
          # 合并所有文件，将 *.domain 格式统一转换为 +.domain，再去重排序
          find domain/ tracker/ blocklist/ -type f -exec cat {} + \
            | sed 's/^\*\./+./g' \
            | sort -u > releases/adblock.txt
          echo "Total domains gathered: $(wc -l < releases/adblock.txt)"
          # 验证通配符规则是否存在
          echo "Wildcard rules count: $(grep -c '^\+\.' releases/adblock.txt || true)"

      - name: Convert to MRS
        run: |
          if [ -s "releases/adblock.txt" ]; then
            ./mihomo convert-ruleset domain text releases/adblock.txt releases/adblock.mrs
          else
            echo "Error: No domains found in domain/ or tracker/"
            exit 1
          fi

      - name: Push to /releases Directory
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add releases/adblock.txt releases/adblock.mrs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update adblock releases: $(date)"
            git push origin master --force
          fi
